<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        html,
        body {
            background-color: black;
        }

        .theia-preload {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            /* Above styles copied from https://github.com/eclipse-theia/theia/blob/5aeef6c0c683b4e91713ab736957e6655b486adc/packages/core/src/browser/style/index.css#L147-L151 */
            /* Otherwise, there is a flickering when Theia's CSS loads. */

            background-image: none;
        }

        .theia-preload::after {
            /* remove default loading animation */
            content: none;
        }

        .spinner-container {
            display: flex;
            flex-direction: center;
            align-self: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        .custom-spinner {
            align-self: center;
        }

        .custom-spinner img {
            width: 12vw;
            height: 12vw;
            max-width: 140px;
            max-height: 140px;
            animation-delay: 0;
            animation-duration: 1.6s;
            animation-iteration-count: infinite;
            animation-name: connectome-spinner;
            animation-timing-function: ease-in-out;
        }

        @keyframes connectome-spinner {
            0% {
                opacity: 0.55;
                transform: scale(0.92);
            }

            50% {
                opacity: 1;
                transform: scale(1.0);
            }

            100% {
                opacity: 0.55;
                transform: scale(0.92);
            }
        }
    </style>
</head>
